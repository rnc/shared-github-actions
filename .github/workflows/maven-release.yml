name: Job for Central Release
on:
  workflow_call: # Manual trigger so you don't release on every push
    inputs:
      ref_to_release:
        description: 'Branch or commit to release. Default: Github default branch'
        required: false
        type: string
        # default has to be a static string, no variables allowed
        default: ''

      java_version:
        description: 'The Java version to use to compile. Default: 21'
        required: false
        type: string
        default: '21' # Java 21 is the default

      release_command:
        description: 'The release command to use. Default: mvn'
        required: false
        type: string
        # localCheckout: don't clone the repo again during release
        #
        # pushChanges: don't push git changes to upstream due to requirement
        #              to use git@github.com :: we don't have ssh setup here
        #              and instead uses https://github.com + github token.
        #              We'll manually push it later
        default: 'mvn -B -V release:prepare release:perform -DlocalCheckout=true -DpushChanges=false'

      fetch_all_commits:
        description: 'Whether to fetch all commits. Default: false'
        required: false
        type: boolean
        default: false

      jboss_parent_override:
        description: "Overrides for Jboss-Parent Central releasing"
        required: false
        type: string
        # central.serverId : We use 'central-publisher' not 'central'
        # central.autoPublsh: Set to false (the plugin default)
        # releaseProfile: Use the central profile not jboss-release
        # signTag: Reset back to maven-release-plugin default
        # tagNameFormat: Reset to maven-release-plugin default
        default: '-Dcentral.serverId=central-publisher -Dcentral.autoPublish=false -DreleaseProfile=central-release -DsignTag=false -DtagNameFormat=@{project.artifactId}-@{project.version}'
    secrets:
      SONATYPE_USERNAME:
        required: true
      SONATYPE_PASSWORD:
        required: true
      GPG_PRIVATE_KEY:
        required: true
      GPG_PASSPHRASE:
        required: true

# cancel in-progress runs of the same workflow
# to avoid unnecessary runs when multiple commits pushed
# in a short period of time
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Allows pushing tags and commits. release plugin uses this

    env:
      # Logic: Use the user input if provided, otherwise fall back to the repo's default branch
      FINAL_REF: ${{ github.event.inputs.ref_to_release || github.event.repository.default_branch }}

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        ref: '${{ env.FINAL_REF }}'
        fetch-depth: ${{ inputs.fetch_all_commits == true && '0' || '1' }}
        persist-credentials: false

    - name: Configure Git User
      run: |
        # This sets the name and email for the commits
        git config --global user.name "github-actions[bot]"
        # official github action email
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Set up JDK '${{ inputs.java_version }}'
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version: '${{ inputs.java_version }}'
        distribution: 'temurin'
        cache: maven
        server-id: central-publisher    # Matches the ID in your pom's distributionManagement
        server-username: MAVEN_USERNAME # Env variable name
        server-password: MAVEN_PASSWORD # env var secret
        gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
        gpg-passphrase: MAVEN_GPG_PASSPHRASE

    - name: Publish to Central
      run: bash -c "${INPUTS_RELEASE_COMMAND}"
      env:
        MAVEN_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        MAVEN_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
        MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        INPUTS_RELEASE_COMMAND: ${{ inputs.release_command }} ${{ inputs.jboss_parent_override }}

    - name: Push all the git commits and tags back to the repository
      run: |
        # Construct the authenticated URL
        # format: https://<token>@github.com/<owner>/<repo>.git
        REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

        git push "${REMOTE}" && git push "${REMOTE}" --tags
      env:
        # Use the standard GITHUB_TOKEN or a Custom PAT if pushing to other repos
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Create the GH Release
      run: |
        # Fetch latest two tags sorted by creation date
        TAGS=$(git tag --sort=-creatordate | head -n 2)
        LATEST_TAG=$(echo "$TAGS" | sed -n '1p')
        PREVIOUS_TAG=$(echo "$TAGS" | sed -n '2p')
        echo "Creating release notes between ${LATEST_TAG} and ${PREVIOUS_TAG}"
        gh release create --generate-notes --notes-start-tag "${PREVIOUS_TAG}" "${LATEST_TAG}"
      env:
        # Use the standard GITHUB_TOKEN or a Custom PAT if pushing to other repos
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
